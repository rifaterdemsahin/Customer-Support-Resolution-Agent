name: Health Check

# Runs the CSRA error-catcher + test suite automatically every 10 minutes and on
# push. On failure, DeepSeek (the project's fix LLM) diagnoses the problem and,
# when the manual "Apply DeepSeek auto-fix" input is on, applies a fix, commits,
# pushes, and re-runs the suite.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      deepseek_fix:
        description: 'Apply DeepSeek auto-fix and push a commit if tests fail'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'backend/**'
      - 'test-animation.js'
      - 'semblance/**'

permissions:
  contents: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Node deps
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run health check
        id: health
        continue-on-error: true
        run: bash semblance/health-check.sh --force

      # DeepSeek diagnoses every failure (and applies edits only when the manual
      # "deepseek_fix" input is true). Skipped entirely if no DEEPSEEK_API_KEY.
      - name: DeepSeek diagnose / auto-fix
        if: ${{ steps.health.outcome == 'failure' && env.DEEPSEEK_API_KEY != '' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deepseek_fix }}" = "true" ]; then
            node semblance/deepseek-fix.js --apply
          else
            node semblance/deepseek-fix.js
          fi

      - name: Commit & push DeepSeek fix
        if: ${{ steps.health.outcome == 'failure' && github.event_name == 'workflow_dispatch' && github.event.inputs.deepseek_fix == 'true' && env.DEEPSEEK_API_KEY != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "DeepSeek proposed no file changes."
          else
            git add -A
            git commit -m "fix(deepseek): auto-fix from health-check failures [skip ci]"
            git push
          fi

      - name: Re-run health check after fix
        id: health2
        if: ${{ steps.health.outcome == 'failure' && github.event_name == 'workflow_dispatch' && github.event.inputs.deepseek_fix == 'true' && env.DEEPSEEK_API_KEY != '' }}
        continue-on-error: true
        run: bash semblance/health-check.sh --force

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: |
            semblance/latest-health.md
            semblance/health-*.md
            semblance/health-*.log
            semblance/latest-deepseek.md
          if-no-files-found: warn

      - name: Final result
        if: always()
        run: |
          first="${{ steps.health.outcome }}"
          second="${{ steps.health2.outcome }}"
          fix="${{ github.event.inputs.deepseek_fix }}"
          if [ "$first" = "success" ]; then echo "✅ Health OK"; exit 0; fi
          if [ "$fix" = "true" ] && [ "$second" = "success" ]; then echo "✅ Fixed by DeepSeek"; exit 0; fi
          echo "❌ Health check failed (first=$first, after-fix=$second, fix=$fix)"
          exit 1
